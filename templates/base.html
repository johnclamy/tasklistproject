<!DOCTYPE html>
<html lang="en">
<head>
    {% block head %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{url_for('static', filename='dist/output.css')}}">
    <title>Task List App | {% block title %}{% endblock %}</title>
    {% endblock %}
</head>
<body>
    <header>        
        <div class="fixed top-0 left-0 w-full z-50 bg-white border-b backdrop-blur-lg bg-opacity-80">
            <div class="mx-auto max-w-5xl px-5 sm:px-6 lg:px-8 ">
                <div class="relative flex h-16 justify-between">
                    <div class="flex flex-1 items-stretch justify-start">
                        <a class="flex shrink-0 items-center" href="#">
                            <img class="block h-12 w-auto" src="{{url_for('static', filename='logo.png')}}">
                        </a>
                    </div>
                    <nav class="shrink-0 flex px-2 py-3 items-center space-x-8">
                        <a class="text-gray-700 hover:text-indigo-700 text-sm font-medium" href="#">Login</a>
                        <a class="text-gray-800 bg-indigo-100 hover:bg-indigo-200 inline-flex items-center justify-center px-3 py-2 border border-transparent text-sm font-medium rounded-md shadow-sm "
                            href="#">Sign up
                        </a>
                    </nav>
                </div>
            </div>
        </div>
    </header>
    <div class="flex flex-col min-h-screen">
        <main class="grow pt-16">
            {% block content %}
            {% endblock %}
        </main>
        <footer class="bg-gray-800 text-white py-4">
            {% block footer %}
            <div class="container mx-auto text-center">
                <p>&copy; 2026 Demo Website. All rights reserved.</p>
            </div>
            {% endblock %}
        </footer>
    </div>
</body>
</html>
